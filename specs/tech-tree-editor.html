<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGI Rush — Tech Tree Editor</title>
<script src="/dagre.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0a0e14; color: #c5c8c6; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Top bar ── */
.topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #141920; border-bottom: 1px solid #1e2630; flex-shrink: 0; }
.topbar h1 { font-size: 14px; color: #8be9fd; }
.topbar button { font-family: inherit; font-size: 11px; padding: 4px 12px; border: 1px solid #58a6ff; border-radius: 4px; background: #0d1117; color: #58a6ff; cursor: pointer; }
.topbar button:hover { background: #58a6ff; color: #fff; }
.topbar .danger { border-color: #e94560; color: #e94560; }
.topbar .danger:hover { background: #e94560; color: #fff; }
.topbar .export-btn { border-color: #3fb950; color: #3fb950; }
.topbar .export-btn:hover { background: #3fb950; color: #fff; }

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Library panel ── */
.library { width: 260px; border-right: 1px solid #1e2630; display: flex; flex-direction: column; background: #0d1117; flex-shrink: 0; }
.library-header { padding: 8px 12px; font-size: 11px; color: #6272a4; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e2630; }
.library-filter { width: 100%; padding: 6px 12px; background: #161b22; border: none; border-bottom: 1px solid #1e2630; color: #c5c8c6; font-family: inherit; font-size: 12px; outline: none; }
.library-list { flex: 1; overflow-y: auto; padding: 8px; }
.library-item { padding: 8px; margin-bottom: 4px; background: #161b22; border: 1px solid #1e2630; border-radius: 6px; cursor: grab; font-size: 11px; }
.library-item:hover { border-color: #58a6ff; }
.library-item .name { color: #c9d1d9; font-weight: bold; }
.library-item .meta { color: #6272a4; font-size: 10px; margin-top: 2px; }
.add-node-btn { margin: 8px; padding: 8px; border: 1px dashed #58a6ff; border-radius: 6px; background: none; color: #58a6ff; cursor: pointer; font-family: inherit; font-size: 11px; }
.add-node-btn:hover { background: #1a2030; }

/* ── Canvas ── */
.canvas-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
.canvas-wrap:active { cursor: grabbing; }
.canvas { position: absolute; top: 0; left: 0; }
.grid-dot { fill: #1e2630; }

/* ── Nodes on canvas ── */
.tree-node { cursor: pointer; user-select: none; }
.tree-node rect { transition: stroke 0.15s; }
.tree-node:hover rect { stroke: #79c0ff; }
.tree-node.selected rect { stroke: #58a6ff; stroke-width: 2; }
.tree-node.connecting rect { stroke: #c678dd; stroke-dasharray: 4 2; }

/* ── Editor panel ── */
.editor { width: 300px; border-left: 1px solid #1e2630; background: #0d1117; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.editor-header { padding: 8px 12px; font-size: 11px; color: #6272a4; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e2630; }
.editor-body { padding: 12px; }
.editor-empty { padding: 24px 12px; color: #484f58; font-size: 12px; text-align: center; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 10px; color: #6272a4; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select, .field textarea { width: 100%; padding: 4px 8px; background: #161b22; border: 1px solid #1e2630; border-radius: 4px; color: #c5c8c6; font-family: inherit; font-size: 12px; outline: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #58a6ff; }
.field textarea { resize: vertical; min-height: 60px; }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
.requires-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.req-tag { font-size: 10px; padding: 2px 6px; background: #1a2030; border: 1px solid #1e2630; border-radius: 3px; color: #58a6ff; display: flex; align-items: center; gap: 4px; }
.req-tag .remove { cursor: pointer; color: #e94560; }
.effects-editor { margin-top: 4px; }
.effect-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
.effect-row select, .effect-row input { padding: 3px 6px; background: #161b22; border: 1px solid #1e2630; border-radius: 3px; color: #c5c8c6; font-family: inherit; font-size: 11px; }
.effect-row .remove-effect { cursor: pointer; color: #e94560; font-size: 14px; background: none; border: none; }
.add-effect-btn { font-family: inherit; font-size: 10px; padding: 3px 8px; border: 1px dashed #58a6ff; border-radius: 3px; background: none; color: #58a6ff; cursor: pointer; margin-top: 4px; }
.delete-node-btn { margin-top: 12px; width: 100%; padding: 6px; border: 1px solid #e94560; border-radius: 4px; background: none; color: #e94560; cursor: pointer; font-family: inherit; font-size: 11px; }
.delete-node-btn:hover { background: #e94560; color: #fff; }

/* ── Edge mode indicator ── */
.edge-mode-banner { padding: 6px 12px; background: #2a1a30; color: #c678dd; font-size: 11px; text-align: center; border-bottom: 1px solid #1e2630; }

/* ── JSON modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #161b22; border: 1px solid #1e2630; border-radius: 8px; padding: 16px; width: 600px; max-height: 80vh; display: flex; flex-direction: column; }
.modal h2 { font-size: 14px; color: #c9d1d9; margin-bottom: 8px; }
.modal textarea { flex: 1; min-height: 400px; padding: 8px; background: #0d1117; border: 1px solid #1e2630; border-radius: 4px; color: #c5c8c6; font-family: 'Courier New', monospace; font-size: 11px; resize: none; }
.modal .actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.modal button { font-family: inherit; font-size: 11px; padding: 6px 16px; border: 1px solid #58a6ff; border-radius: 4px; background: #0d1117; color: #58a6ff; cursor: pointer; }
.modal button:hover { background: #58a6ff; color: #fff; }
.modal button.close { border-color: #6272a4; color: #6272a4; }
.modal button.close:hover { background: #6272a4; color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Tech Tree Editor</h1>
  <button onclick="addNode()">+ New Node</button>
  <button onclick="startEdgeMode()">🔗 Connect</button>
  <button onclick="autoLayout()">📐 Auto Layout</button>
  <button class="export-btn" onclick="exportJSON()">Export JSON</button>
  <button onclick="importJSON()">Import JSON</button>
  <a href="/items" style="font-size:11px;color:#6272a4;text-decoration:none">Items</a>
  <a href="/feedback" style="font-size:11px;color:#3fb950;text-decoration:none">Feedback</a>
  <button class="danger" onclick="clearAll()">Clear All</button>
  <span id="status" style="color:#6272a4;font-size:11px;margin-left:auto"></span>
</div>

<div id="edge-banner" class="edge-mode-banner" style="display:none">
  Edge mode: click source node, then target node. Press Esc to cancel.
</div>

<div class="main">
  <!-- Library -->
  <div class="library">
    <div class="library-header">Node Library</div>
    <input class="library-filter" placeholder="Filter nodes..." oninput="renderLibrary(this.value)">
    <div class="library-list" id="library-list"></div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="canvas" class="canvas"></svg>
  </div>

  <!-- Editor -->
  <div class="editor">
    <div class="editor-header">Node Editor</div>
    <div id="editor-body"></div>
  </div>
</div>

<div id="modal" class="modal-overlay" style="display:none"></div>

<script>
// ── State ──
let nodes = [];
let nextId = 1;
let selectedId = null;
let selectedIds = new Set(); // multi-select
let edgeMode = false;
let edgeSource = null;
let pan = { x: 50, y: 50 };
let zoom = 1;
let isPanning = false;
let lastMouse = { x: 0, y: 0 };
let draggingNode = null;
let draggingGroup = false; // true when dragging multi-selected nodes
let dragOffset = { x: 0, y: 0 };
let dragStartPositions = {}; // { id: { x, y } } snapshot at drag start
let boxSelecting = false;
let boxStart = { x: 0, y: 0 }; // in SVG coords
let boxEnd = { x: 0, y: 0 };

const GRID = 20;
const NODE_W = 140;
const NODE_H = 48;

const EFFECT_TYPES = [
  'locPerKey', 'autoLoc', 'internLoc', 'devLoc',
  'flops', 'cpuFlops', 'ramFlops', 'storageFlops',
  'locProductionSpeed', 'cashMultiplier', 'devSpeed',
  'internLocMultiplier', 'devLocMultiplier',
  'internCostDiscount', 'devCostDiscount',
  'tierUnlock', 'autoType'
];

const OPS = ['add', 'multiply', 'set', 'enable'];

// ── API sync ──
const API = '/api/tree';
let saveTimeout = null;
let positions = {}; // persisted in localStorage: { [id]: { x, y } }

try {
  const p = localStorage.getItem('tech-tree-positions');
  if (p) positions = JSON.parse(p);
} catch {}

function savePositions() {
  const pos = {};
  for (const n of nodes) pos[n.id] = { x: n._x, y: n._y };
  localStorage.setItem('tech-tree-positions', JSON.stringify(pos));
}

function save() {
  // Debounce writes to file
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveToServer, 500);
  savePositions();
  status('Saving...');
}

async function saveToServer() {
  try {
    const payload = { nodes: nodes.map(n => ({ ...n })) };
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload, null, 2)
    });
    const data = await res.json();
    if (data.ok) status(`Saved ${data.count} nodes to tech-tree.json`);
    else status('Error: ' + data.error);
  } catch (err) {
    status('Offline — save failed');
  }
}

async function loadFromServer() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    if (data.nodes) {
      // Check if any nodes lack saved positions
      const needsLayout = data.nodes.some(n => !positions[n.id]);

      nodes = data.nodes.map(n => ({
        ...n,
        _x: positions[n.id]?.x ?? n.x ?? 0,
        _y: positions[n.id]?.y ?? n.y ?? 0,
      }));
      nextId = nodes.length + 1;

      // Auto-layout nodes without saved positions using dagre
      if (needsLayout && typeof dagre !== 'undefined') {
        // Only layout nodes that need positioning
        const toLayout = nodes.filter(n => !positions[n.id]);
        if (toLayout.length === nodes.length) {
          // All nodes need layout — use autoLayout which handles orphans
          // (positions will be saved by autoLayout)
        } else {
          // Partial layout — place new nodes near their parents
          for (const n of toLayout) {
            if (n.requires.length > 0) {
              const parent = getNode(n.requires[0]);
              if (parent) {
                n._x = snap(parent._x + (Math.random() - 0.5) * 200);
                n._y = snap(parent._y + NODE_H + 80);
                continue;
              }
            }
            // Orphan — put at bottom
            n._x = snap(80 + Math.random() * 400);
            n._y = snap(800 + Math.random() * 100);
          }
        }
        savePositions();
      }

      status('Loaded ' + nodes.length + ' nodes from tech-tree.json');
    }
  } catch {
    status('Could not connect to server — run: node specs/tech-tree-server.js');
  }
  render();
}

function status(msg) {
  document.getElementById('status').textContent = msg;
  setTimeout(() => document.getElementById('status').textContent = '', 2000);
}

// ── Snap to grid ──
function snap(v) { return Math.round(v / GRID) * GRID; }

// ── Node CRUD ──
function addNode() {
  const id = `node_${nextId++}`;
  nodes.push({
    id, name: 'New Node', description: '', icon: '🔧',
    requires: [], max: 1, baseCost: 100, costMultiplier: 1.0,
    currency: 'cash', effects: [],
    _x: snap(200 + Math.random() * 300), _y: snap(100 + Math.random() * 300)
  });
  selectedId = id;
  save();
  render();
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  // Remove from requires
  for (const n of nodes) {
    n.requires = n.requires.filter(r => r !== id);
  }
  if (selectedId === id) selectedId = null;
  save();
  render();
}

function getNode(id) { return nodes.find(n => n.id === id); }

function autoLayout() {
  if (nodes.length === 0) { status('No nodes'); return; }
  if (typeof dagre === 'undefined') { status('Error: dagre not loaded'); return; }

  // Split connected vs disconnected (orphan) nodes
  // A node is "connected" if it has requires OR is required by someone
  const requiredBy = new Set();
  for (const n of nodes) {
    for (const r of n.requires) requiredBy.add(r);
  }
  const connected = nodes.filter(n => n.requires.length > 0 || requiredBy.has(n.id));
  const orphans = nodes.filter(n => n.requires.length === 0 && !requiredBy.has(n.id));
  console.log('autoLayout:', connected.length, 'connected,', orphans.length, 'orphans');

  // Layout connected nodes with dagre
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: 'TB', nodesep: 120, ranksep: 100, marginx: 80, marginy: 80 });
  g.setDefaultEdgeLabel(() => ({}));

  for (const n of connected) {
    g.setNode(n.id, { width: NODE_W, height: NODE_H });
  }
  for (const n of connected) {
    for (const req of n.requires) {
      if (connected.find(c => c.id === req)) g.setEdge(req, n.id);
    }
  }

  if (connected.length > 0) dagre.layout(g);

  for (const n of connected) {
    const pos = g.node(n.id);
    if (pos) {
      n._x = snap(pos.x - NODE_W / 2);
      n._y = snap(pos.y - NODE_H / 2);
    }
  }

  // Place orphans in a row at the bottom
  const graphInfo = g.graph();
  const treeBottom = (graphInfo.height || 200) + 120;
  const orphanStartX = 80;
  for (let i = 0; i < orphans.length; i++) {
    orphans[i]._x = snap(orphanStartX + i * (NODE_W + 40));
    orphans[i]._y = snap(treeBottom);
  }

  // Center in viewport
  const wrap = document.getElementById('canvas-wrap');
  pan.x = (wrap.clientWidth - (graphInfo.width || 800) * zoom) / 2;
  pan.y = 40;

  save();
  render();
  status(`Auto-layout: ${connected.length} connected, ${orphans.length} orphans`);
}

// ── Edge mode ──
function startEdgeMode() {
  edgeMode = true;
  edgeSource = null;
  document.getElementById('edge-banner').style.display = '';
  render();
}

function cancelEdgeMode() {
  edgeMode = false;
  edgeSource = null;
  document.getElementById('edge-banner').style.display = 'none';
  render();
}

function handleNodeClick(id, e) {
  if (edgeMode) {
    if (!edgeSource) {
      edgeSource = id;
      render();
    } else if (edgeSource !== id) {
      const target = getNode(id);
      if (target && !target.requires.includes(edgeSource)) {
        target.requires.push(edgeSource);
        save();
      }
      cancelEdgeMode();
    }
    return;
  }
  // Shift+click toggles multi-select
  if (e && e.shiftKey) {
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      if (selectedId === id) selectedId = selectedIds.size > 0 ? [...selectedIds][0] : null;
    } else {
      selectedIds.add(id);
      if (selectedId) selectedIds.add(selectedId);
      selectedId = id;
    }
  } else {
    selectedId = id;
    selectedIds = new Set([id]);
  }
  render();
}

// ── Canvas rendering ──
function render() {
  renderCanvas();
  renderEditor();
  renderLibrary(document.querySelector('.library-filter')?.value || '');
}

function renderCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const svg = document.getElementById('canvas');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  let html = '';

  // Grid dots
  const dotSpacing = GRID * 2;
  const startX = -pan.x / zoom - dotSpacing;
  const startY = -pan.y / zoom - dotSpacing;
  const endX = (W - pan.x) / zoom + dotSpacing;
  const endY = (H - pan.y) / zoom + dotSpacing;
  for (let x = snap(startX); x < endX; x += dotSpacing) {
    for (let y = snap(startY); y < endY; y += dotSpacing) {
      html += `<circle class="grid-dot" cx="${x}" cy="${y}" r="1"/>`;
    }
  }

  // Compute ancestor set for selected node
  const ancestorSet = new Set();
  const ancestorEdges = new Set(); // "from->to" strings
  if (selectedId) {
    const walk = (id) => {
      const n = getNode(id);
      if (!n) return;
      for (const reqId of n.requires) {
        ancestorSet.add(reqId);
        ancestorEdges.add(`${reqId}->${id}`);
        walk(reqId);
      }
    };
    walk(selectedId);
  }

  // Edges
  for (const node of nodes) {
    for (const reqId of node.requires) {
      const parent = getNode(reqId);
      if (!parent) continue;
      const x1 = parent._x + NODE_W / 2;
      const y1 = parent._y + NODE_H;
      const x2 = node._x + NODE_W / 2;
      const y2 = node._y;
      const cy1 = y1 + (y2 - y1) * 0.4;
      const cy2 = y1 + (y2 - y1) * 0.6;
      const isAncestorEdge = ancestorEdges.has(`${reqId}->${node.id}`);
      const edgeColor = isAncestorEdge ? '#58a6ff' : '#1e2630';
      const edgeOpacity = selectedId && !isAncestorEdge && node.id !== selectedId ? 0.3 : 1;
      html += `<path d="M${x1},${y1} C${x1},${cy1} ${x2},${cy2} ${x2},${y2}" fill="none" stroke="${edgeColor}" stroke-width="${isAncestorEdge ? 2.5 : 2}" opacity="${edgeOpacity}"/>`;
      html += `<polygon points="${x2-4},${y2-6} ${x2+4},${y2-6} ${x2},${y2}" fill="${edgeColor}" opacity="${edgeOpacity}"/>`;
    }
  }

  // Nodes
  for (const node of nodes) {
    const isAncestor = ancestorSet.has(node.id);
    const isSelected = node.id === selectedId || selectedIds.has(node.id);
    const dimmed = selectedId && !isSelected && !isAncestor && selectedIds.size <= 1;
    const cls = [
      'tree-node',
      isSelected ? 'selected' : '',
      edgeMode && edgeSource === node.id ? 'connecting' : ''
    ].join(' ');

    const currColor = node.currency === 'loc' ? '#58a6ff' : '#d19a66';
    const tierIdx = getNodeTier(node.id);
    const tierColor = TIER_COLORS[tierIdx] || '#6272a4';
    const isTierNode = node.effects.some(e => e.type === 'tierUnlock');
    html += `
      <g class="${cls}" transform="translate(${node._x},${node._y})" opacity="${dimmed ? 0.25 : 1}"
         onmousedown="startDrag(event, '${node.id}')"
         onclick="handleNodeClick('${node.id}', event)">
        <rect width="${NODE_W}" height="${NODE_H}" rx="8" fill="#161b22" stroke="${isTierNode ? tierColor : '#1e2630'}" stroke-width="${isTierNode ? 2 : 1.5}"/>
        <rect x="0" y="${NODE_H - 3}" width="${NODE_W}" height="3" rx="0 0 8 8" fill="${tierColor}" opacity="0.5"/>
        <text x="28" y="18" fill="#c9d1d9" font-size="11" font-weight="bold" font-family="inherit">${escapeHtml(node.name.slice(0, 16))}</text>
        <text x="28" y="32" fill="#6272a4" font-size="9" font-family="inherit">${node.id}</text>
        <text x="8" y="30" font-size="16">${node.icon}</text>
        <circle cx="${NODE_W - 8}" cy="8" r="4" fill="${currColor}" opacity="0.6"/>
        ${node.max > 1 ? `<text x="${NODE_W - 16}" y="42" fill="#484f58" font-size="9" font-family="inherit" text-anchor="end">x${node.max}</text>` : ''}
      </g>
    `;
  }

  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  // Box selection rect
  let boxHtml = '';
  if (boxSelecting) {
    const bx = Math.min(boxStart.x, boxEnd.x);
    const by = Math.min(boxStart.y, boxEnd.y);
    const bw = Math.abs(boxEnd.x - boxStart.x);
    const bh = Math.abs(boxEnd.y - boxStart.y);
    boxHtml = `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="rgba(88,166,255,0.1)" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 2"/>`;
  }

  svg.innerHTML = `<g transform="translate(${pan.x},${pan.y}) scale(${zoom})">${html}${boxHtml}</g>`;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Library ──
// ── Tier detection ──
// Walk ancestors to find which tier a node belongs to.
// Tier nodes have effects with type "tierUnlock".
// Nodes that ARE tier unlocks belong to the tier they unlock.
// Nodes requiring a tier unlock belong to that tier.
// Nodes with no tier ancestor are "Garage".
const TIER_NAMES = ['Garage', 'Freelancing', 'Startup', 'Tech Company', 'AI Lab', 'AGI Race'];
const TIER_COLORS = ['#6272a4', '#8be9fd', '#3fb950', '#d19a66', '#c678dd', '#e94560'];

function getNodeTier(id, visited) {
  if (!visited) visited = new Set();
  if (visited.has(id)) return 0;
  visited.add(id);
  const node = getNode(id);
  if (!node) return 0;

  // If this node IS a tier unlock, return that tier
  for (const e of node.effects) {
    if (e.type === 'tierUnlock') return e.value;
  }

  // Check requires — take the max tier of parents
  let maxTier = 0;
  for (const reqId of node.requires) {
    const parentTier = getNodeTier(reqId, visited);
    // If parent is a tier unlock, this node belongs to that tier
    const parent = getNode(reqId);
    if (parent) {
      for (const e of parent.effects) {
        if (e.type === 'tierUnlock' && e.value > maxTier) maxTier = e.value;
      }
    }
    if (parentTier > maxTier) maxTier = parentTier;
  }
  return maxTier;
}

function renderLibrary(filter = '') {
  const list = document.getElementById('library-list');
  const f = filter.toLowerCase();

  // Compute tier for each node
  const tiered = nodes.map(n => ({ node: n, tier: getNodeTier(n.id) }));

  // Group by tier
  const groups = {};
  for (const { node, tier } of tiered) {
    if (f && !node.name.toLowerCase().includes(f) && !node.id.toLowerCase().includes(f)) continue;
    if (!groups[tier]) groups[tier] = [];
    groups[tier].push(node);
  }

  let html = '';
  const sortedTiers = Object.keys(groups).map(Number).sort((a, b) => a - b);
  for (const tier of sortedTiers) {
    const name = TIER_NAMES[tier] || `Tier ${tier}`;
    const color = TIER_COLORS[tier] || '#6272a4';
    html += `<div style="font-size:10px;color:${color};text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px;margin-top:4px;border-bottom:1px solid #1e2630;font-weight:bold">${name}</div>`;
    const tierNodeIds = new Set(groups[tier].map(n => n.id));
    for (const node of groups[tier]) {
      const isTierNode = node.effects.some(e => e.type === 'tierUnlock');
      // Color-code requires: same-tier deps in yellow, cross-tier in default
      const reqHtml = node.requires.length
        ? '← ' + node.requires.map(r => {
            const isSameTier = tierNodeIds.has(r);
            const rn = getNode(r);
            const label = rn ? rn.name : r;
            return isSameTier
              ? `<span style="color:#e5c07b" title="same tier">${escapeHtml(label)}</span>`
              : `<span style="color:#6272a4">${escapeHtml(label)}</span>`;
          }).join(', ')
        : '<span style="color:#484f58">root</span>';
      html += `
        <div class="library-item" onclick="handleNodeClick('${node.id}', event); scrollToNode('${node.id}')" style="${isTierNode ? 'border-left:3px solid ' + color : ''}">
          <div class="name">${node.icon} ${escapeHtml(node.name)}</div>
          <div class="meta">${node.id} | ${node.currency} | ${reqHtml}</div>
        </div>
      `;
    }
  }
  list.innerHTML = html;
}

function scrollToNode(id) {
  const node = getNode(id);
  if (!node) return;
  const wrap = document.getElementById('canvas-wrap');
  pan.x = wrap.clientWidth / 2 - node._x * zoom - NODE_W / 2 * zoom;
  pan.y = wrap.clientHeight / 2 - node._y * zoom - NODE_H / 2 * zoom;
  render();
}

// ── Editor panel ──
function renderEditor() {
  const body = document.getElementById('editor-body');
  const node = getNode(selectedId);
  if (!node) {
    body.innerHTML = '<div class="editor-empty">Select a node to edit</div>';
    return;
  }

  const reqOptions = nodes.filter(n => n.id !== node.id).map(n =>
    `<option value="${n.id}">${n.icon} ${escapeHtml(n.name)}</option>`
  ).join('');

  const effectsHtml = node.effects.map((e, i) => `
    <div class="effect-row">
      <select onchange="updateEffect(${i}, 'type', this.value)">
        ${EFFECT_TYPES.map(t => `<option value="${t}" ${t === e.type ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
      <select onchange="updateEffect(${i}, 'op', this.value)">
        ${OPS.map(o => `<option value="${o}" ${o === e.op ? 'selected' : ''}>${o}</option>`).join('')}
      </select>
      <input type="text" style="width:60px" value="${e.value}" onchange="updateEffect(${i}, 'value', this.value)">
      <button class="remove-effect" onclick="removeEffect(${i})">×</button>
    </div>
  `).join('');

  const reqTags = node.requires.map(r => {
    const rn = getNode(r);
    return `<span class="req-tag">${rn ? rn.icon + ' ' + rn.name : r} <span class="remove" onclick="removeRequire('${r}')">×</span></span>`;
  }).join('');

  body.innerHTML = `
    <div class="editor-body">
      <div class="field-row">
        <div class="field">
          <label>ID</label>
          <input value="${node.id}" onchange="updateField('id', this.value)">
        </div>
        <div class="field">
          <label>Icon</label>
          <input value="${node.icon}" style="width:40px" onchange="updateField('icon', this.value)">
        </div>
      </div>
      <div class="field">
        <label>Name</label>
        <input value="${escapeHtml(node.name)}" onchange="updateField('name', this.value)">
      </div>
      <div class="field">
        <label>Description</label>
        <input value="${escapeHtml(node.description)}" onchange="updateField('description', this.value)">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Currency</label>
          <select onchange="updateField('currency', this.value)">
            <option value="cash" ${node.currency === 'cash' ? 'selected' : ''}>Cash</option>
            <option value="loc" ${node.currency === 'loc' ? 'selected' : ''}>LoC</option>
          </select>
        </div>
        <div class="field">
          <label>Max</label>
          <input type="number" value="${node.max}" onchange="updateField('max', +this.value)">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Base Cost</label>
          <input type="number" value="${node.baseCost}" onchange="updateField('baseCost', +this.value)">
        </div>
        <div class="field">
          <label>Cost ×</label>
          <input type="number" step="0.1" value="${node.costMultiplier}" onchange="updateField('costMultiplier', +this.value)">
        </div>
      </div>

      <div class="field">
        <label>Requires</label>
        <select onchange="addRequire(this.value); this.value=''">
          <option value="">+ Add dependency...</option>
          ${reqOptions}
        </select>
        <div class="requires-list">${reqTags}</div>
      </div>

      <div class="field">
        <label>Effects</label>
        <div class="effects-editor">${effectsHtml}</div>
        <button class="add-effect-btn" onclick="addEffect()">+ Add Effect</button>
      </div>

      <div class="field">
        <label>Level Labels (one per line)</label>
        <textarea onchange="updateField('levelLabels', this.value.split('\\n').filter(Boolean))">${(node.levelLabels || []).join('\n')}</textarea>
      </div>

      <button class="delete-node-btn" onclick="deleteNode('${node.id}')">Delete Node</button>
    </div>
  `;
}

function updateField(key, value) {
  const node = getNode(selectedId);
  if (!node) return;
  if (key === 'id') {
    const oldId = node.id;
    node.id = value;
    // Update references
    for (const n of nodes) {
      n.requires = n.requires.map(r => r === oldId ? value : r);
    }
    selectedId = value;
  } else {
    node[key] = value;
  }
  save();
  render();
}

function addRequire(id) {
  const node = getNode(selectedId);
  if (!node || !id || node.requires.includes(id)) return;
  node.requires.push(id);
  save();
  render();
}

function removeRequire(id) {
  const node = getNode(selectedId);
  if (!node) return;
  node.requires = node.requires.filter(r => r !== id);
  save();
  render();
}

function addEffect() {
  const node = getNode(selectedId);
  if (!node) return;
  node.effects.push({ type: 'flops', op: 'add', value: 1 });
  save();
  render();
}

function updateEffect(i, key, value) {
  const node = getNode(selectedId);
  if (!node || !node.effects[i]) return;
  if (key === 'value') {
    if (value === 'true') value = true;
    else if (value === 'false') value = false;
    else if (!isNaN(+value)) value = +value;
  }
  node.effects[i][key] = value;
  save();
  render();
}

function removeEffect(i) {
  const node = getNode(selectedId);
  if (!node) return;
  node.effects.splice(i, 1);
  save();
  render();
}

// ── Drag nodes ──
function startDrag(e, id) {
  if (edgeMode) return;
  e.stopPropagation();
  const node = getNode(id);
  if (!node) return;
  draggingNode = id;
  const svgPt = screenToSvg(e.clientX, e.clientY);
  dragOffset = { x: svgPt.x - node._x, y: svgPt.y - node._y };

  // If dragging a node that's part of multi-select, move the whole group
  if (selectedIds.has(id) && selectedIds.size > 1) {
    draggingGroup = true;
    dragStartPositions = {};
    for (const sid of selectedIds) {
      const sn = getNode(sid);
      if (sn) dragStartPositions[sid] = { x: sn._x, y: sn._y };
    }
  } else {
    draggingGroup = false;
    selectedId = id;
    selectedIds = new Set([id]);
  }
  render();
}

function screenToSvg(sx, sy) {
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  return {
    x: (sx - rect.left - pan.x) / zoom,
    y: (sy - rect.top - pan.y) / zoom
  };
}

// ── Pan/Zoom ──
const canvasWrap = document.getElementById('canvas-wrap');

function isInsideNode(el) {
  // Walk up SVG DOM to find a .tree-node <g>
  let node = el;
  while (node && node !== canvasWrap) {
    if (node.classList && node.classList.contains('tree-node')) return true;
    node = node.parentNode;
  }
  return false;
}

canvasWrap.addEventListener('mousedown', e => {
  if (draggingNode) return;
  if (isInsideNode(e.target)) return;

  if (e.shiftKey) {
    // Shift+drag on empty canvas = box select
    boxSelecting = true;
    boxStart = screenToSvg(e.clientX, e.clientY);
    boxEnd = { ...boxStart };
    return;
  }

  // Click on empty canvas deselects
  selectedId = null;
  selectedIds = new Set();
  render();
  isPanning = true;
  lastMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mousemove', e => {
  if (draggingNode) {
    const pt = screenToSvg(e.clientX, e.clientY);
    const newX = snap(pt.x - dragOffset.x);
    const newY = snap(pt.y - dragOffset.y);

    if (draggingGroup) {
      // Move all selected nodes by the same delta
      const anchor = dragStartPositions[draggingNode];
      if (anchor) {
        const dx = newX - anchor.x;
        const dy = newY - anchor.y;
        for (const sid of selectedIds) {
          const sn = getNode(sid);
          const sp = dragStartPositions[sid];
          if (sn && sp) {
            sn._x = snap(sp.x + dx);
            sn._y = snap(sp.y + dy);
          }
        }
      }
    } else {
      const node = getNode(draggingNode);
      if (node) {
        node._x = newX;
        node._y = newY;
      }
    }
    renderCanvas();
    return;
  }
  if (boxSelecting) {
    boxEnd = screenToSvg(e.clientX, e.clientY);
    renderCanvas();
    return;
  }
  if (isPanning) {
    pan.x += e.clientX - lastMouse.x;
    pan.y += e.clientY - lastMouse.y;
    lastMouse = { x: e.clientX, y: e.clientY };
    renderCanvas();
  }
});

window.addEventListener('mouseup', () => {
  if (draggingNode) {
    save();
    draggingNode = null;
    draggingGroup = false;
    dragStartPositions = {};
  }
  if (boxSelecting) {
    // Select all nodes inside the box
    const x1 = Math.min(boxStart.x, boxEnd.x);
    const y1 = Math.min(boxStart.y, boxEnd.y);
    const x2 = Math.max(boxStart.x, boxEnd.x);
    const y2 = Math.max(boxStart.y, boxEnd.y);
    for (const n of nodes) {
      const cx = n._x + NODE_W / 2;
      const cy = n._y + NODE_H / 2;
      if (cx >= x1 && cx <= x2 && cy >= y1 && cy <= y2) {
        selectedIds.add(n.id);
      }
    }
    if (selectedIds.size > 0) selectedId = [...selectedIds][0];
    boxSelecting = false;
    render();
    return;
  }
  isPanning = false;
});

canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.2, Math.min(3, zoom * delta));
  renderCanvas();
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    cancelEdgeMode();
    selectedIds = new Set();
    boxSelecting = false;
    render();
  }
  if (e.key === 'Delete' && !e.target.closest('input, textarea, select')) {
    if (selectedIds.size > 1) {
      for (const id of [...selectedIds]) deleteNode(id);
    } else if (selectedId) {
      deleteNode(selectedId);
    }
  }
  // Ctrl+A selects all
  if (e.key === 'a' && (e.ctrlKey || e.metaKey) && !e.target.closest('input, textarea, select')) {
    e.preventDefault();
    selectedIds = new Set(nodes.map(n => n.id));
    if (nodes.length > 0) selectedId = nodes[0].id;
    render();
  }
});

// ── Export / Import ──
function exportJSON() {
  const output = {
    nodes: nodes.map(n => {
      const obj = {
        id: n.id,
        name: n.name,
        description: n.description,
        icon: n.icon,
        requires: n.requires,
        max: n.max,
        baseCost: n.baseCost,
        costMultiplier: n.costMultiplier,
        currency: n.currency,
        effects: n.effects
      };
      if (n.levelLabels && n.levelLabels.length > 0) obj.levelLabels = n.levelLabels;
      return obj;
    })
  };
  showModal('Export JSON', JSON.stringify(output, null, 2), true);
}

function importJSON() {
  showModal('Import JSON', '', false, (json) => {
    try {
      const data = JSON.parse(json);
      if (!data.nodes || !Array.isArray(data.nodes)) throw new Error('Missing nodes array');
      const golden = Math.PI * (3 - Math.sqrt(5));
      nodes = data.nodes.map((n, i) => ({
        ...n,
        _x: positions[n.id]?.x ?? snap(400 + Math.sqrt(i + 1) * 80 * Math.cos(i * golden)),
        _y: positions[n.id]?.y ?? snap(300 + Math.sqrt(i + 1) * 80 * Math.sin(i * golden)),
      }));
      nextId = nodes.length + 1;
      selectedId = null;
      save();
      render();
    } catch (err) {
      alert('Invalid JSON: ' + err.message);
    }
  });
}

function clearAll() {
  if (!confirm('Delete all nodes?')) return;
  nodes = [];
  selectedId = null;
  save();
  render();
}

function showModal(title, content, readonly, onSubmit) {
  const modal = document.getElementById('modal');
  modal.style.display = '';
  modal.innerHTML = `
    <div class="modal">
      <h2>${title}</h2>
      <textarea id="modal-text" ${readonly ? 'readonly' : ''}>${escapeHtml(content)}</textarea>
      <div class="actions">
        ${readonly ? `<button onclick="navigator.clipboard.writeText(document.getElementById('modal-text').value); status('Copied!')">Copy</button>` : ''}
        ${onSubmit ? `<button onclick="window._modalSubmit()">Import</button>` : ''}
        <button class="close" onclick="document.getElementById('modal').style.display='none'">Close</button>
      </div>
    </div>
  `;
  if (readonly) {
    document.getElementById('modal-text').select();
  }
  if (onSubmit) {
    window._modalSubmit = () => {
      onSubmit(document.getElementById('modal-text').value);
      modal.style.display = 'none';
    };
  }
}

// ── Resize ──
window.addEventListener('resize', () => renderCanvas());

// ── Init: load from server ──
// Also auto-layout on first load if positions were cleared
async function init() {
  await loadFromServer();
  // If all nodes are at (0,0), force auto-layout
  const allAtOrigin = nodes.length > 0 && nodes.every(n => n._x === 0 && n._y === 0);
  if (allAtOrigin) {
    autoLayout();
  }
}
init();
</script>
